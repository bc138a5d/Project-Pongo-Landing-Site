# Pongo project landing — reverse proxy in front of `next start` on :3000.
# Self-contained: no external includes, so it parses before certs exist.
# Install:
#   cp deploy/nginx/pongo.conf /etc/nginx/sites-available/pongo
#   ln -sf /etc/nginx/sites-available/pongo /etc/nginx/sites-enabled/pongo
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx

# Rate limit zone (http context). 10 MB ≈ 160k unique IPs, 10 r/s sustained
# per IP with a 20-request burst for short spikes.
limit_req_zone $binary_remote_addr zone=pongo:10m rate=10r/s;

# HTTP — serve ACME http-01 challenges, redirect everything else to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pongo-project.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pongo-project.ru;

    # Certs (issued by certbot; standard paths)
    ssl_certificate     /etc/letsencrypt/live/pongo-project.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pongo-project.ru/privkey.pem;

    # Modern SSL profile (self-contained; ECDHE-only, no DHE/DH params needed).
    # OCSP stapling is intentionally NOT configured: Let's Encrypt doesn't
    # publish an OCSP responder URL in the cert, so ssl_stapling is a no-op
    # and only spams the error log. Browsers fall back to live OCSP checks.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "SAMEORIGIN" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

    # Content Security Policy — strict but compatible with Next.js 16 / React 19
    # / Tailwind 4 in production. Page has no external scripts, fonts, or
    # analytics.
    #   - script-src needs 'unsafe-inline' because Next.js emits inline
    #     <script> blocks for the React Server Components payload. Without
    #     it, hydration never runs and framer-motion entrance animations
    #     leave the page at opacity:0. Acceptable for this static landing
    #     (no user input is rendered as HTML). If we add forms/UGC later,
    #     switch to per-request nonces.
    #   - style-src 'unsafe-inline' for inline style attributes emitted by
    #     React 19 / Tailwind 4.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # Disable browser features the landing page never uses
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;

    # Reverse proxy to next start
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming (Next.js App Router — Suspense / loading.tsx).
        # Per Next.js 16 self-hosting docs:
        # node_modules/next/dist/docs/01-app/02-guides/self-hosting.md
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 60s;

        # Per-IP rate limit (10 r/s sustained, burst 20)
        limit_req zone=pongo burst=20 nodelay;
    }
}
